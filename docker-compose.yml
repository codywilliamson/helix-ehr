services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: helix_ehr
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./hasura/migrations/001_create_users/up.sql:/docker-entrypoint-initdb.d/01_users.sql:ro
      - ./hasura/migrations/002_create_patients/up.sql:/docker-entrypoint-initdb.d/02_patients.sql:ro
      - ./hasura/migrations/003_create_visits/up.sql:/docker-entrypoint-initdb.d/03_visits.sql:ro
      - ./hasura/seeds/001_seed_data.sql:/docker-entrypoint-initdb.d/04_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  hasura:
    image: hasura/graphql-engine:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgres://postgres:postgres@postgres:5432/helix_ehr
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
      HASURA_GRAPHQL_DEV_MODE: "true"
      HASURA_GRAPHQL_ADMIN_SECRET: "${HASURA_GRAPHQL_ADMIN_SECRET:-your-hasura-admin-secret}"
      HASURA_GRAPHQL_UNAUTHORIZED_ROLE: anonymous
      HASURA_GRAPHQL_LOG_LEVEL: warn
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
    name: helix-ehr-pgdata
